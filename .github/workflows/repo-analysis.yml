name: Enhanced Repository Analysis

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, closed, synchronize, reopened]
  workflow_dispatch:
    inputs:
      full_analysis:
        description: 'Perform full analysis (ignore cache)'
        required: false
        default: 'false'
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Download analyzer script
        env:
            BASE_URL: ${{ secrets.WEBSITE_BASE_URL }}
        run: |
          echo "📥 Downloading enhanced_analyzer.py from $BASE_URL/enhanced_analyzer.py"
          curl -L -o enhanced_analyzer.py "$BASE_URL/enhanced_analyzer.py" \
            -H 'Accept: text/x-python' \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 2

          if [ ! -f enhanced_analyzer.py ]; then
            echo '❌ Failed to download enhanced_analyzer.py'
            exit 1
          fi

          LINE_COUNT=$(wc -l < enhanced_analyzer.py)
          echo "✅ Downloaded enhanced_analyzer.py ($LINE_COUNT lines)"
          echo '📋 Script preview (first 10 lines):'
          head -10 enhanced_analyzer.py

      - name: Run enhanced repository analysis
        run: |
          echo "🔍 Starting repository analysis..."
          START_TIME=$(date +%s)
          python3 enhanced_analyzer.py
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "✅ Analysis completed in ${DURATION} seconds"

      - name: Send analysis to external service
        env:
          WEBHOOK_ENDPOINT: ${{ secrets.WEBHOOK_ENDPOINT }}
          WEBHOOK_API_TOKEN: ${{ secrets.WEBHOOK_API_TOKEN }}
        run: |
          MAX_WAIT=5
          WAIT_COUNT=0
          until [ -n "$WEBHOOK_ENDPOINT" ] && [ -n "$WEBHOOK_API_TOKEN" ]; do
            if [ "$WAIT_COUNT" -ge "$MAX_WAIT" ]; then
              echo "❌ Secrets not available after ${MAX_WAIT} retries."
              exit 1
            fi
            echo "⏳ Secrets not yet available — waiting 10 s (attempt $((WAIT_COUNT+1))/$MAX_WAIT)..."
            sleep 10
            WAIT_COUNT=$((WAIT_COUNT+1))
            WEBHOOK_ENDPOINT="${{ secrets.WEBHOOK_ENDPOINT }}"
            WEBHOOK_API_TOKEN="${{ secrets.WEBHOOK_API_TOKEN }}"
          done

          if [ -z "$WEBHOOK_ENDPOINT" ]; then
            echo "❌ WEBHOOK_ENDPOINT secret is not set!"
            exit 1
          fi

          if [ -z "$WEBHOOK_API_TOKEN" ]; then
            echo "❌ WEBHOOK_API_TOKEN secret is not set!"
            exit 1
          fi

          if [ -f "enhanced_analysis_result.json" ]; then
            echo "📤 Sending analysis to $WEBHOOK_ENDPOINT"
            
            # Get file size for logging
            FILE_SIZE=$(stat -c%s "enhanced_analysis_result.json" 2>/dev/null || stat -f%z "enhanced_analysis_result.json" 2>/dev/null || echo "unknown")
            echo "📦 Analysis file size: $FILE_SIZE bytes"

            # Use a background process with retry logic for long-running requests
            MAX_RETRIES=3
            RETRY_COUNT=0
            SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
              if [ $RETRY_COUNT -gt 0 ]; then
                echo "🔄 Retry attempt $((RETRY_COUNT+1))/$MAX_RETRIES..."
                sleep 5
              fi

              temp_response=$(mktemp)
              temp_headers=$(mktemp)

              # Increase timeout to 10 minutes (600 seconds) for large repos
              http_code=$(curl -L -X POST "$WEBHOOK_ENDPOINT" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                -H "X-API-Token: $WEBHOOK_API_TOKEN" \
                -H "X-GitHub-Event: ${{ github.event_name }}" \
                -H "X-Repository: ${{ github.repository }}" \
                -H "X-Run-ID: ${{ github.run_id }}" \
                -d @enhanced_analysis_result.json \
                --max-time 600 \
                --connect-timeout 30 \
                -w "%{http_code}" \
                -o "$temp_response" \
                -s \
                --location \
                --fail \
                2>&1) || true

              if [ -f "$temp_response" ]; then
                response_body=$(cat "$temp_response")
                
                if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                  echo "✅ Analysis sent successfully (HTTP $http_code)"
                  echo "📝 Response: $response_body"
                  SUCCESS=true
                else
                  echo "❌ Failed to send analysis (HTTP $http_code)"
                  echo "Response: $response_body"
                  
                  # Check if it's a timeout vs other error
                  if [ "$http_code" = "000" ] || [ -z "$http_code" ]; then
                    echo "⚠️ Connection timeout or no response - will retry"
                  fi
                fi
                
                rm -f "$temp_response"
                rm -f "$temp_headers"
              else
                echo "❌ No response received (possible timeout)"
              fi

              RETRY_COUNT=$((RETRY_COUNT+1))
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "❌ Failed to send analysis after $MAX_RETRIES attempts"
              exit 1
            fi
          else
            echo "❌ Analysis file not found at enhanced_analysis_result.json"
            echo "📁 Current directory contents:"
            ls -la
            exit 1
          fi

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: enhanced-analysis-${{ github.run_id }}
          path: enhanced_analysis_result.json
          retention-days: 7
          if-no-files-found: warn
